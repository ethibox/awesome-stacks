# DOMAIN=example.com docker stack deploy -c zammad.yml zammad
# sudo sysctl -w vm.max_map_count=262144
# echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf

services:
  zammad-chown:
    image: busybox
    command: chown -R 1000:1000 /opt/zammad/var /opt/zammad/storage /usr/share/elasticsearch/data
    user: root
    volumes:
      - ${VOLUME_PATH}var:/opt/zammad/var
      - ${VOLUME_PATH}storage:/opt/zammad/storage
      - ${VOLUME_PATH}elasticsearch:/usr/share/elasticsearch/data
    deploy:
      restart_policy:
        condition: on-failure

  zammad-init:
    image: &zammad-image zammad/zammad-docker-compose:${VERSION:-7.0.1-0002}
    command: ["zammad-init"]
    volumes: &zammad-volumes
      - ${VOLUME_PATH}var:/opt/zammad/var
      - ${VOLUME_PATH}storage:/opt/zammad/storage
    environment: &zammad-environment
      - NGINX_SERVER_SCHEME=https
      - POSTGRESQL_DB=zammad
      - POSTGRESQL_USER=zammad
      - POSTGRESQL_PASS=myp@ssw0rd
      - POSTGRESQL_HOST=zammad-postgresql
      - POSTGRESQL_OPTIONS=${POSTGRESQL_OPTIONS:-?pool=50}
      - MEMCACHE_SERVERS=${MEMCACHE_SERVERS:-zammad-memcached:11211}
      - REDIS_URL=redis://zammad-redis:6379
      - MALLOC_ARENA_MAX=${MALLOC_ARENA_MAX:-2}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - TZ=${TZ:-Europe/Paris}
    deploy:
      restart_policy:
        condition: on-failure
    networks:
      - internal

  zammad-nginx:
    image: *zammad-image
    command: ["zammad-nginx"]
    environment: *zammad-environment
    volumes: *zammad-volumes
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
      labels:
        - traefik.enable=true
        - traefik.http.routers.zammad-${NUMBER:-1}.rule=Host(`${DOMAIN:-zammad.localhost}`)
        - traefik.http.services.zammad-${NUMBER:-1}.loadbalancer.server.port=8080
        - traefik.http.routers.zammad-${NUMBER:-1}.middlewares=zammad-${NUMBER:-1}
        - traefik.http.middlewares.zammad-${NUMBER:-1}.headers.customRequestHeaders.X-Forwarded-Proto=https
    networks:
      - traefik
      - internal

  zammad-elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_VERSION:-9.3.1}
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - ${VOLUME_PATH}elasticsearch:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  zammad-memcached:
    image: memcached:1.6.41-alpine
    command: memcached -m 256M
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  zammad-postgresql:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    command: postgres -c 'max_connections=250'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zammad"]
    volumes:
      - ${VOLUME_PATH}postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=zammad
      - POSTGRES_USER=zammad
      - POSTGRES_PASSWORD=myp@ssw0rd
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  zammad-redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    volumes:
      - ${VOLUME_PATH}redis:/data
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  zammad-railsserver:
    image: *zammad-image
    command: ["zammad-railsserver"]
    environment: *zammad-environment
    volumes: *zammad-volumes
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  zammad-scheduler:
    image: *zammad-image
    command: ["zammad-scheduler"]
    environment: *zammad-environment
    volumes: *zammad-volumes
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  zammad-websocket:
    image: *zammad-image
    command: ["zammad-websocket"]
    environment: *zammad-environment
    volumes: *zammad-volumes
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

volumes:
  var:
  redis:
  storage:
  elasticsearch:
  postgresql:

networks:
  internal:
    driver: overlay
    attachable: true
  traefik:
    external: true
    name: traefik-net
