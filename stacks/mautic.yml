# DOMAIN=example.com docker stack deploy -c mautic.yml mautic

services:
  app:
    image: ${IMAGE:-mautic/mautic}:${VERSION:-7-apache}
    volumes:
      - ${VOLUME_PATH}config:/var/www/html/config
      - ${VOLUME_PATH}files:/var/www/html/docroot/media/files
      - ${VOLUME_PATH}images:/var/www/html/docroot/media/images
    environment:
      - MAUTIC_DB_USER=mautic
      - MAUTIC_DB_HOST=mariadb
      - MAUTIC_DB_DATABASE=mautic
      - MAUTIC_DB_PASSWORD=myp@ssw0rd
      - MAUTIC_TRUSTED_PROXIES=["REMOTE_ADDR"]
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
      labels:
        - traefik.enable=true
        - traefik.http.routers.mautic-${NUMBER:-1}.rule=Host(`${DOMAIN:-mautic.localhost}`)
        - traefik.http.services.mautic-${NUMBER:-1}.loadbalancer.server.port=80
    networks:
      - internal
      - traefik

  mariadb:
    image: mariadb:${MARIADB_VERSION:-11.4}
    environment:
      - MYSQL_USER=mautic
      - MYSQL_DATABASE=mautic
      - MYSQL_PASSWORD=myp@ssw0rd
      - MYSQL_ROOT_PASSWORD=myp@ssw0rd
    volumes:
      - ${VOLUME_PATH}mariadb:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

volumes:
  mariadb:
  config:
  images:
  files:

networks:
  internal:
    driver: overlay
    attachable: true
  traefik:
    external: true
    name: traefik-net
