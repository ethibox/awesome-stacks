# DOMAIN=example.com docker stack deploy -c vikunja.yml vikunja

services:
  init:
    image: busybox
    command: chown -R 1000:1000 /app/vikunja/files
    user: root
    volumes:
      - ${VOLUME_PATH}files:/app/vikunja/files
    deploy:
      restart_policy:
        condition: on-failure

  app:
    image: vikunja/vikunja:${VERSION:-2.1.0}
    environment:
      - VIKUNJA_DATABASE_TYPE=mysql
      - VIKUNJA_DATABASE_HOST=mariadb
      - VIKUNJA_DATABASE_USER=vikunja
      - VIKUNJA_DATABASE_DATABASE=vikunja
      - VIKUNJA_DATABASE_PASSWORD=myp@ssw0rd
      - VIKUNJA_SERVICE_JWTSECRET=${JWT_SECRET:-mys3cr3t}
      - VIKUNJA_SERVICE_PUBLICURL=https://${DOMAIN:-vikunja.localhost}
    volumes:
      - ${VOLUME_PATH}files:/app/vikunja/files
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.vikunja-${NUMBER:-1}.rule=Host(`${DOMAIN:-vikunja.localhost}`)
        - traefik.http.services.vikunja-${NUMBER:-1}.loadbalancer.server.port=3456
    networks:
      - internal
      - traefik

  mariadb:
    image: mariadb:${MARIADB_VERSION:-11.4}
    volumes:
      - ${VOLUME_PATH}mariadb:/var/lib/mysql:cached
    environment:
      - MYSQL_USER=${MYSQL_USER:-vikunja}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-vikunja}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-myp@ssw0rd}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-myp@ssw0rd}
    networks:
      - internal

volumes:
  files:
  mariadb:

networks:
  internal:
    driver: overlay
    attachable: true
  traefik:
    external: true
    name: traefik-net
