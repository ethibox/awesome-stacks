# DOMAIN=example.com docker stack deploy -c matomo.yml matomo

services:
  nginx:
    image: ethibox/nginx-proxy:latest
    environment:
      - NGINX_TEMPLATE=${NGINX_TEMPLATE:-/etc/nginx/matomo.template}
      - SERVER_NAME={{ index .Service.Labels "com.docker.stack.namespace" }}_app
    volumes:
      - ${VOLUME_PATH}data:/var/www/html:ro
      - ${VOLUME_PATH}config:/var/www/html/config:ro
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
      labels:
        - traefik.enable=true
        - traefik.http.routers.matomo-${NUMBER:-1}.rule=Host(`${DOMAIN:-matomo.localhost}`)
        - traefik.http.services.matomo-${NUMBER:-1}.loadbalancer.server.port=80
    networks:
      - internal
      - traefik

  app:
    image: &matomo-image matomo:${VERSION:-5.8.0-fpm-alpine}
    environment: &matomo-environment
      - MATOMO_DATABASE_USERNAME=matomo
      - MATOMO_DATABASE_DBNAME=matomo
      - MATOMO_DATABASE_PASSWORD=myp@ssw0rd
      - MATOMO_DATABASE_HOST=mariadb
    volumes: &matomo-volumes
      - ${VOLUME_PATH}config:/var/www/html/config
      - ${VOLUME_PATH}data:/var/www/html
    deploy: &matomo-deploy
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

  cron:
    image: *matomo-image
    environment: *matomo-environment
    volumes: *matomo-volumes
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cp -a /usr/src/matomo/. /var/www/html/
        chown -R www-data:www-data /var/www/html
        php /var/www/html/console core:update --yes 2>/dev/null || true
        echo "0 * * * * /usr/local/bin/php /var/www/html/console core:archive --url=http://localhost" > /var/spool/cron/crontabs/www-data
        exec crond -f
    deploy: *matomo-deploy
    networks:
      - internal

  mariadb:
    image: mariadb:${MARIADB_VERSION:-10.5.9}
    volumes:
      - ${VOLUME_PATH}mariadb:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=myp@ssw0rd
      - MYSQL_DATABASE=matomo
      - MYSQL_USER=matomo
      - MYSQL_PASSWORD=myp@ssw0rd
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
    networks:
      - internal

volumes:
  mariadb:
  config:
  data:

networks:
  internal:
    driver: overlay
    attachable: true
  traefik:
    external: true
    name: traefik-net
