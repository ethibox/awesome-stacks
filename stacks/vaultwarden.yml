# DOMAIN=example.com docker stack deploy -c vaultwarden.yml vaultwarden

services:
  web:
    image: vaultwarden/server:${VERSION:-1.36.0}
    environment:
      - DOMAIN=https://${DOMAIN:-vaultwarden.localhost}
      - ADMIN_TOKEN=${ADMIN_TOKEN} # ./vaultwarden hash
    volumes:
      - ${VOLUME_PATH}data:/data
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.vaultwarden-${NUMBER:-1}.rule=Host(`${DOMAIN:-vaultwarden.localhost}`)
        - traefik.http.services.vaultwarden-${NUMBER:-1}.loadbalancer.server.port=80
    networks:
      - traefik
      - internal

volumes:
  data:

networks:
  internal:
    driver: overlay
    attachable: true
  traefik:
    external: true
    name: traefik-net
